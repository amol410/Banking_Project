# Test Database Configuration (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration for tests
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT Configuration
app.jwt.secret=7a3f8c1d5e9b2f4a6c8e0d2f4a6b8c0e2d4f6a8b0c2e4f6a8b0c2e4f6a8b0c2
app.jwt.expiration=86400000

# SpringDoc
springdoc.swagger-ui.enabled=false

# Email (disabled in tests - use dummy host to satisfy JavaMailSender bean creation)
app.mail.enabled=false
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Refresh token
app.refresh-token.expiration=604800000

# Interest rate
app.interest.rate=0.04
app.interest.schedule=0 0 0 1 * *
